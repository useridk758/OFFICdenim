<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Docs</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_arrow_favicon_5.ico">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <canvas id="starfield"></canvas>
    <div id="cursor"></div>

    <header id="top-bar" class="status-bar">
        <div class="header-content">
            <div class="logo-section">
                <span class="denim-logo">D<span>!</span></span>
            </div>
            <div id="big-logo" class="big-logo-hidden">Denim<span>!</span></div>
            <div id="clock-container" class="clock-section">
                <span id="digital-time"></span>
                <div id="analog-clock">
                    <div class="hand hour"></div>
                    <div class="hand minute"></div>
                    <div class="hand second"></div>
                </div>
            </div>
        </div>
    </header>

    <div id="home-screen" class="container">
        <h1>Denim<span>!</span></h1>
        
        <div class="search-section">
            <div class="search-wrapper">
                <input type="text" id="url-input" placeholder="Search or enter URL" autocomplete="off">
                <button id="go-btn">Launch</button>
            </div>

            <div class="quick-apps">
                <div class="app-btn" onclick="openApp('https://monochrome.tf', 'Music')">🎵 Music</div>
                <div class="app-btn" onclick="openApp('https://freezenova.ai/chat/', 'Chat')">💬 Chat</div>
            </div>
        </div>

        <div class="bottom-menu">
            <div class="bottom-btn" onclick="alert('Settings Coming Soon')">⚙️ Settings</div>
            <div class="bottom-btn premium" onclick="alert('Denim! Premium is not yet available')">💎 Denim! Premium</div>
        </div>
    </div>

    <div id="browser-screen" class="hidden">
        <div class="browser-header">
            <div id="display-url">Loading Session...</div>
            <button id="exit-btn">✖ Exit to Denim!</button>
        </div>
        <div class="iframe-container">
            <iframe id="content-frame" src=""></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
