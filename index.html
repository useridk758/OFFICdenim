<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Docs</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_arrow_favicon_5.ico">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Lobster&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="bg-layer">
        <div id="bg-gif"></div>
        <div id="vignette"></div>
    </div>

    <div id="setup-overlay" class="overlay-full">
        <div id="step-1" class="step fade-in denim-font">Denim<span>!</span></div>
        <div id="step-2" class="step hidden glass">
            <h2>What is your name?</h2>
            <input type="text" id="user-name-input" placeholder="Enter name...">
            <button class="nav-btn" onclick="nextStep(3)">Continue</button>
        </div>
        <div id="step-3" class="step hidden glass">
            <h2>Select Server</h2>
            <div class="btn-row">
                <button class="nav-btn" onclick="nextStep(4)">UV</button>
                <button class="nav-btn" onclick="nextStep(4)">SJ</button>
            </div>
        </div>
        <div id="step-4" class="step hidden glass">
            <h2>Destination</h2>
            <div class="btn-row">
                <button class="nav-btn gold-border" onclick="finishSetup()">Home</button>
            </div>
        </div>
    </div>

    <header class="status-bar glass">
        <div class="header-content">
            <span class="denim-logo-small denim-font">D<span>!</span></span>
            <div class="big-logo-center denim-font">Denim<span>!</span></div>
            <div id="analog-clock">
                <div class="hand hour"></div><div class="hand minute"></div><div class="hand second"></div>
            </div>
            <span id="digital-time"></span>
        </div>
    </header>

    <div id="home-screen" class="container">
        <div class="hero-clock">
            <div id="hero-time">00:00</div>
            <div id="hero-date">SATURDAY, MARCH 28</div>
        </div>

        <div class="search-section">
            <div class="search-wrapper glass">
                <span class="search-icon">🔍</span>
                <input type="text" id="url-input" placeholder="Search or enter URL..." autocomplete="off">
            </div>

            <div class="shortcut-grid">
                <div class="shortcut-item">
                    <div class="mini-tile glass" onclick="openApp('https://youtube.com', 'YouTube', true)"><img src="https://play-lh.googleusercontent.com/6am0i3walYwNLc08QOOhRJttQENNGkhlKajXSERf3JnPVRQczIyxw2w3DxeMRTOSdsY"></div>
                    <span class="label">YouTube</span>
                </div>
                <div class="shortcut-item">
                    <div class="mini-tile glass" onclick="openApp('https://tiktok.com', 'TikTok', true)"><img src="https://sf-static.tiktokcdn.com/obj/eden-sg/uhtyvueh7nulogpoguhm/tiktok-icon2.png"></div>
                    <span class="label">TikTok</span>
                </div>
                <div class="shortcut-item">
                    <div class="mini-tile glass" onclick="openApp('https://reddit.com', 'Reddit', true)"><img src="https://store-images.s-microsoft.com/image/apps.15970.14375561300249796.05fe8c27-ce9e-4144-8702-0e81e2f575b1.042364cb-b745-4796-a520-61291e2dd6b9"></div>
                    <span class="label">Reddit</span>
                </div>
                <div class="shortcut-item">
                    <div class="mini-tile glass" onclick="openApp('https://guns.lol', 'Guns.lol', true)"><img src="https://r2.guns.lol/1f777c67-183c-4d75-b813-e6f6ae6921ce.png"></div>
                    <span class="label">Guns.lol</span>
                </div>
            </div>
        </div>

        <div class="bottom-menu">
            <div class="shortcut-item">
                <div class="mini-tile glass" onclick="openApp('https://monochrome.tf', 'Music', false)"><img src="https://images.rawpixel.com/image_png_800/cHJpdmF0ZS9sci9pbWFnZXMvd2Vic2l0ZS8yMDI0LTAzL3Jhd3BpeGVsX29mZmljZV80N19hX2JsYWNrX3NpbGhvdWV0dGVfYV9tdXNpY19sb2dvX2ljb25fb25fYV93aF8xNjlkYjJiMS1hNmE4LTQ4MDgtOWEzZS1iNmViMmI1NjA2NzdfMS5wbmc.png"></div>
                <span class="label">Music</span>
            </div>
            <div class="shortcut-item">
                <div class="mini-tile glass" onclick="openApp('https://freezenova.ai/chat/', 'Chat', false)"><img src="https://images.icon-icons.com/916/PNG/512/Chat_icon-icons.com_71840.png"></div>
                <span class="label">Chat</span>
            </div>
            <div class="shortcut-item">
                <div class="mini-tile glass">⚙️</div>
                <span class="label">Settings</span>
            </div>
            <div class="shortcut-item">
                <div class="mini-tile glass premium-border" id="premium-trigger">💎</div>
                <span class="label">Premium</span>
            </div>
        </div>
    </div>

    <div id="browser-screen" class="hidden">
        <div class="browser-nav glass">
            <div class="nav-left">
                <button class="nav-icon" onclick="goHome()">🏠</button>
                <button class="nav-icon" onclick="refreshPage()">🔄</button>
            </div>
            <div class="address-bar-container">
                <input type="text" id="browser-address" placeholder="Enter URL...">
                <div id="loader" class="spinner hidden"></div>
            </div>
            <button class="nav-icon exit" onclick="goHome()">✖</button>
        </div>
        <iframe id="content-frame"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
