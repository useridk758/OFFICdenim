<!DOCTYPE html>
<html>
<head>
    <title>Google Docs</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_arrow_favicon_5.ico">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@titaniumnetwork-dev/ultraviolet@3.0.2/dist/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
</head>
<body>
    <div id="home-screen" class="container">
        <h1>Denim<span>!</span></h1>
        <div class="search-box">
            <input type="text" id="url-input" placeholder="Enter URL (e.g. tiktok.com)">
            <button id="go-btn">Go</button>
        </div>
    </div>

    <div id="browser-screen" style="display:none;">
        <div class="nav-bar">
            <button id="exit-btn">✖ Exit to Denim!</button>
        </div>
        <iframe id="content-frame"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
