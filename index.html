<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Google Docs</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/docs/doclist/images/infinite_arrow_favicon_5.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="search-ui" class="center-container">
        <h1>Denim<span>!</span></h1>
        <div class="input-group">
            <input type="text" id="target-url" placeholder="Enter website URL (e.g., https://example.com)">
            <button id="launch-btn">Go</button>
        </div>
        <p>Press <strong>`</strong> to Panic</p>
    </div>

    <div id="browser-ui" style="display: none;">
        <div class="top-bar">
            <button id="back-home">✖ Close Site</button>
        </div>
        <iframe id="site-viewer" src=""></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
